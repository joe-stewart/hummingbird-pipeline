<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; fill: #333; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; font-weight: 400; }
    .arr { stroke: #888; stroke-width: 1.5; fill: none; }
    .node-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .node-purple text { fill: #3C3489; }
    .node-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
    .node-teal text { fill: #085041; }
    .node-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
    .node-gray text { fill: #444441; }
    .node-blue rect { fill: #E6F1FB; stroke: #185FA5; }
    .node-blue text { fill: #0C447C; }
    .backbone { stroke: #aaa; stroke-width: 1.5; }
    .drop { stroke: #aaa; stroke-width: 1; }
    .wifi { stroke: #aaa; stroke-width: 1; stroke-dasharray: 3 3; }
  </style>
</defs>

<!-- Backbone -->
<line x1="40" y1="88" x2="620" y2="88" class="backbone"/>
<text class="ts" x="320" y="76" text-anchor="middle" fill="#aaa" font-size="11">ethernet</text>

<!-- NUC -->
<g class="node-purple">
  <rect x="20" y="98" width="140" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="90" y="120" text-anchor="middle" dominant-baseline="central">nuc</text>
  <text class="ts" x="90" y="138" text-anchor="middle" dominant-baseline="central">admin · storage</text>
</g>
<line x1="90" y1="88" x2="90" y2="98" class="drop"/>

<!-- reCamera -->
<g class="node-teal">
  <rect x="245" y="98" width="150" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="320" y="120" text-anchor="middle" dominant-baseline="central">recamera</text>
  <text class="ts" x="320" y="138" text-anchor="middle" dominant-baseline="central">CV inference · detect</text>
</g>
<line x1="320" y1="88" x2="320" y2="98" class="drop"/>

<!-- Beryl -->
<g class="node-gray">
  <rect x="470" y="98" width="140" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="540" y="120" text-anchor="middle" dominant-baseline="central">beryl</text>
  <text class="ts" x="540" y="138" text-anchor="middle" dominant-baseline="central">WiFi AP</text>
</g>
<line x1="540" y1="88" x2="540" y2="98" class="drop"/>

<!-- Arduino -->
<g class="node-gray">
  <rect x="470" y="216" width="140" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="540" y="238" text-anchor="middle" dominant-baseline="central">arduino</text>
  <text class="ts" x="540" y="256" text-anchor="middle" dominant-baseline="central">LED · watchdog</text>
</g>
<line x1="540" y1="154" x2="540" y2="216" class="wifi" marker-end="url(#arrow)"/>
<text class="ts" x="554" y="190" font-size="10" fill="#aaa">WiFi</text>

<!-- recamera -> jetson -->
<line x1="320" y1="154" x2="320" y2="216" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="334" y="190" font-size="10" fill="#888">WebSocket</text>

<!-- Jetson -->
<g class="node-teal">
  <rect x="245" y="216" width="150" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="320" y="238" text-anchor="middle" dominant-baseline="central">jetson</text>
  <text class="ts" x="320" y="256" text-anchor="middle" dominant-baseline="central">orchestration · capture</text>
</g>

<!-- jetson -> rpi2 -->
<line x1="320" y1="272" x2="320" y2="334" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="334" y="308" font-size="10" fill="#888">ntfy / MQTT</text>

<!-- RPi2 -->
<g class="node-teal">
  <rect x="245" y="334" width="150" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="320" y="356" text-anchor="middle" dominant-baseline="central">rpi2</text>
  <text class="ts" x="320" y="374" text-anchor="middle" dominant-baseline="central">Mosquitto · ntfy broker</text>
</g>

<!-- rpi2 -> ntfy client -->
<line x1="320" y1="390" x2="320" y2="444" class="arr" marker-end="url(#arrow)"/>

<!-- ntfy client -->
<g class="node-blue">
  <rect x="245" y="444" width="150" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="320" y="466" text-anchor="middle" dominant-baseline="central">ntfy client</text>
  <text class="ts" x="320" y="484" text-anchor="middle" dominant-baseline="central">phone / browser</text>
</g>

</svg>
