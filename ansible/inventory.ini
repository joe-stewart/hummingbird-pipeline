[lab]
jetson   ansible_host=192.168.2.8  ansible_user=nvidia
rpi2     ansible_host=192.168.2.10 ansible_user=pi
recamera ansible_host=192.168.2.14 ansible_user=root

[openwrt]
beryl    ansible_host=192.168.2.2  ansible_user=root

[lab:vars]
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_ssh_common_args='-o IdentitiesOnly=yes'

[openwrt:vars]
ansible_python_interpreter=/dev/null
ansible_shell_type=sh
