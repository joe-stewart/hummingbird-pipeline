[lab]
beryl ansible_host=${BERYL_IP} ansible_user=root
jetson ansible_host=${JETSON_IP}
rpi2 ansible_host=${RPI2_IP}
recamera ansible_host=${RECAMERA_IP} ansible_user=recamera ansible_ssh_private_key_file=/home/joe/.ssh/birdcam_lab

[openwrt]
beryl

[openwrt:vars]
ansible_python_interpreter=auto
ansible_shell_type=sh
ansible_gather_facts=false

[lab:vars]
ansible_user=joe
ansible_ssh_private_key_file=~/.ssh/birdcam_lab
